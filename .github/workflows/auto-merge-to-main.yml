name: Create PR for review

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING_PR" ]; then
            BODY="## Deploy Preview"
            BODY="${BODY}\n\nNetlify will automatically add a deploy preview link as a comment below."
            BODY="${BODY}\nClick that link to review the changes before going live."
            BODY="${BODY}\n\nWhen you are happy with the preview, merge this PR to publish to the live site."
            gh pr create --title "Website update: ${BRANCH#claude/}" --body "$(echo -e "$BODY")" --base main --head "$BRANCH"
            echo "Created new PR for $BRANCH"
          else
            echo "PR #$EXISTING_PR already exists for $BRANCH"
          fi
